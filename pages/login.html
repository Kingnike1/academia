<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PowerFit Premium</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body style="padding-top: 100px;">

    <header class="main-header">
        <div class="container">
            <a href="../index.html" class="logo" style="text-decoration:none;">Power<span>Fit</span></a>
            <nav class="main-nav">
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="plano.html">Planos</a></li>
                    <li><a href="cadastro.html">Cadastre-se</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="container">
        <div style="max-width: 400px; margin: 0 auto; background: #1e293b; padding: 40px; border-radius: 20px; border: 1px solid #334155; box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
            <h2 style="margin-bottom: 20px; text-align: center;">Entrar</h2>
            <p style="text-align: center; color: #94a3b8; margin-bottom: 30px;">Bem-vindo de volta à sua melhor versão.</p>
            <form class="contact-form" action="dashboard.html">
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom: 5px; font-size: 0.8rem; color: #94a3b8;">E-mail</label>
                    <input type="email" placeholder="seu@email.com" required style="width: 100%;">
                </div>
                <div style="margin-bottom: 25px;">
                    <label style="display:block; margin-bottom: 5px; font-size: 0.8rem; color: #94a3b8;">Senha</label>
                    <input type="password" placeholder="••••••••" required style="width: 100%;">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Acessar Dashboard</button>
            </form>
            <p style="text-align: center; margin-top: 25px; font-size: 0.9rem;">Não tem conta? <a href="cadastro.html" style="color: var(--primary-color);">Crie uma agora</a></p>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 PowerFit Premium. Todos os direitos reservados.</p>
        </div>
    </footer>

</body>
</html>
