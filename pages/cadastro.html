<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | PowerFit Premium</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body style="padding-top: 100px;">

    <header class="main-header">
        <div class="container">
            <a href="../index.html" class="logo" style="text-decoration:none;">Power<span>Fit</span></a>
            <nav class="main-nav">
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="plano.html">Planos</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="container">
        <div style="max-width: 500px; margin: 0 auto; background: #1e293b; padding: 40px; border-radius: 20px; border: 1px solid #334155;">
            <h2 style="margin-bottom: 20px;">Cadastre-se</h2>
            <form class="contact-form">
                <input type="text" placeholder="Nome Completo" required>
                <input type="email" placeholder="E-mail" required>
                <input type="password" placeholder="Senha" required>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Criar Conta</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">Já tem conta? <a href="login.html">Faça Login</a></p>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 PowerFit Premium. Todos os direitos reservados.</p>
        </div>
    </footer>

</body>
</html>
