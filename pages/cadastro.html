<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro PowerFit</title>
</head>

<body>
    <form action="">
        <label for="nome">Nome:</label>
        <input type="text" name="nome" id="nome" placeholder="Digite seu nome" required minlength="2" maxlength="100"
            autocomplete="name">
        <br>
        <label for="email">Email:</label>
        <input type="email" name="email" id="email" placeholder="Digite seu email" required autocomplete="email">
        <br>
        <label for="senha">Senha:</label>
        <input type="password" name="senha" id="senha" placeholder="Digite sua senha" required minlength="8"
            autocomplete="new-password">
        <br>
        <label for="data-nascimento">Data de Nascimento:</label>
        <input type="date" name="data-nascimento" id="data-nascimento" required autocomplete="bday">
        <br>
        <label for="endereco">Endereço:</label>
        <input type="text" name="endereco" id="endereco" placeholder="Digite seu endereço" required minlength="5"
            autocomplete="address-line1">
        <br>
        <label for="telefone">Telefone:</label>
        <input type="tel" name="telefone" id="telefone" placeholder="Digite seu telefone" required autocomplete="tel">
        <br>
        <label for="genero">Gênero:</label>
        <select name="genero" id="genero" required>
            <option value="">Selecione</option>
            <option value="masculino">Masculino</option>
            <option value="feminino">Feminino</option>
            <option value="outro">Outro</option>
        </select>
        <br>
        <label for="peso">Peso (kg):</label>
        <input type="number" name="peso" id="peso" placeholder="Digite seu peso" required min="1" max="300" step="0.1">
        <br>
        <label for="altura">Altura (cm):</label>
        <input type="number" name="altura" id="altura" placeholder="Digite sua altura" required min="100" max="250">
        <br>
        <label for="objetivos">Objetivos:</label>
        <select name="objetivos" id="objetivos" required>
            <option value="">Selecione</option>
            <option value="perder_peso">Perder peso</option>
            <option value="ganhar_massa">Ganhar massa muscular</option>
            <option value="condicionamento">Melhorar condicionamento</option>
            <option value="saude">Saúde geral</option>
        </select>

        <input type="submit" value="Cadastrar">
    </form>


    <p>
        Já tem conta? <a href="pages/login.html">Login</a>
    </p>
        <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 PowerFit. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
